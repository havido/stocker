
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - ./backend/.env
    command: uvicorn sentiment_analysis:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
    depends_on:
      - redis
    env_file:
      - ./backend/.env
    command: taskiq worker tasks:broker
    volumes:
      - ./backend:/app
