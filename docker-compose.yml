version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
    depends_on:
      - redis
    command: taskiq worker tasks:broker
    volumes:
      - ./backend:/app
